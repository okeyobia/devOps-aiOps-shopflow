apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: shopflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: 430367037730.dkr.ecr.us-east-2.amazonaws.com/shopflow/user-service:fa89aee610be7b36db2395e8f26dad3fbe637197
          ports:
            - containerPort: 3005
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shopflow-secrets
                  key: USERS_DB_URL
          readinessProbe:
            httpGet:
              path: /users/health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: shopflow
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 3005
      targetPort: 3005
  type: ClusterIP
