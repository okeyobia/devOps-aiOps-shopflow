apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopflow
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/okey-obia/devops-mlops-journey
    targetRevision: main
    path: devops-aiops/shopflow/gitops

  destination:
    server: https://kubernetes.default.svc
    namespace: shopflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
