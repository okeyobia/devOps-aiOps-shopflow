name: ShopFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER: shopflow-eks-cluster
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Build & push all services to ECR ─────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - gateway
          - order-service
          - product-service
          - user-service
          - frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker Image
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            BUILD_PATH="shopflow/frontend"
          else
            BUILD_PATH="shopflow/backend/${{ matrix.service }}"
          fi

          echo "Building ${{ matrix.service }} from $BUILD_PATH"

          docker buildx build \
            --platform linux/amd64 \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/shopflow/${{ matrix.service }}:$IMAGE_TAG \
            $BUILD_PATH

      - name: Push Docker Image
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          IMAGE_URI=${ACCOUNT}.dkr.ecr.$AWS_REGION.amazonaws.com/shopflow/${{ matrix.service }}:$IMAGE_TAG

          docker push $IMAGE_URI
          docker tag $IMAGE_URI ${ACCOUNT}.dkr.ecr.$AWS_REGION.amazonaws.com/shopflow/${{ matrix.service }}:latest
          docker push ${ACCOUNT}.dkr.ecr.$AWS_REGION.amazonaws.com/shopflow/${{ matrix.service }}:latest

  # ── Update k8s manifests with new image tags ──────────────────────────────
  update-manifests:
    name: Update Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in k8s manifests
        run: |
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          REGION=${{ secrets.AWS_REGION }}

          for SERVICE in auth gateway order-service product-service user-service; do
            MANIFEST="gitops/k8s/backend/${SERVICE}.yaml"
            sed -i "s|image: .*shopflow/${SERVICE}:.*|image: ${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/shopflow/${SERVICE}:${IMAGE_TAG}|g" \
              $MANIFEST
          done

          sed -i "s|image: .*shopflow/frontend:.*|image: ${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/shopflow/frontend:${IMAGE_TAG}|g" \
            gitops/k8s/frontend/frontend.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${IMAGE_TAG}"
          git push

  # ── Deploy to EKS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: update-manifests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name   ${{ env.EKS_CLUSTER }}

      - name: Deploy via Kustomize
        run: kubectl apply -k gitops/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/auth            -n shopflow --timeout=120s
          kubectl rollout status deployment/user-service    -n shopflow --timeout=120s
          kubectl rollout status deployment/product-service -n shopflow --timeout=120s
          kubectl rollout status deployment/order-service   -n shopflow --timeout=120s
          kubectl rollout status deployment/gateway         -n shopflow --timeout=120s
          kubectl rollout status deployment/frontend        -n shopflow --timeout=120s

      - name: Show deployed services
        run: kubectl get svc -n shopflow
