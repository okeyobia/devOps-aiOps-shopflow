name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-2
  EKS_CLUSTER: shopflow-eks-cluster

jobs:
  # ── Detect which services changed ────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend:        ${{ steps.filter.outputs.frontend }}
      auth:            ${{ steps.filter.outputs.auth }}
      gateway:         ${{ steps.filter.outputs.gateway }}
      order-service:   ${{ steps.filter.outputs.order-service }}
      product-service: ${{ steps.filter.outputs.product-service }}
      user-service:    ${{ steps.filter.outputs.user-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'shopflow/frontend/**'
            auth:
              - 'shopflow/backend/auth/**'
            gateway:
              - 'shopflow/backend/gateway/**'
            order-service:
              - 'shopflow/backend/order-service/**'
            product-service:
              - 'shopflow/backend/product-service/**'
            user-service:
              - 'shopflow/backend/user-service/**'

  # ── Build & push changed services to ECR ─────────────────────────────────
  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.auth == 'true' ||
      needs.changes.outputs.gateway == 'true' ||
      needs.changes.outputs.order-service == 'true' ||
      needs.changes.outputs.product-service == 'true' ||
      needs.changes.outputs.user-service == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: shopflow/frontend
            manifest: shopflow/gitops/k8s/frontend/frontend.yaml
            changed: ${{ needs.changes.outputs.frontend }}
          - service: auth
            context: shopflow/backend/auth
            manifest: shopflow/gitops/k8s/backend/auth.yaml
            changed: ${{ needs.changes.outputs.auth }}
          - service: gateway
            context: shopflow/backend/gateway
            manifest: shopflow/gitops/k8s/backend/gateway.yaml
            changed: ${{ needs.changes.outputs.gateway }}
          - service: order-service
            context: shopflow/backend/order-service
            manifest: shopflow/gitops/k8s/backend/order-service.yaml
            changed: ${{ needs.changes.outputs.order-service }}
          - service: product-service
            context: shopflow/backend/product-service
            manifest: shopflow/gitops/k8s/backend/product-service.yaml
            changed: ${{ needs.changes.outputs.product-service }}
          - service: user-service
            context: shopflow/backend/user-service
            manifest: shopflow/gitops/k8s/backend/user-service.yaml
            changed: ${{ needs.changes.outputs.user-service }}

    steps:
      - name: Skip unchanged service
        if: matrix.changed != 'true'
        run: echo "No changes in ${{ matrix.service }}, skipping."

      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Configure AWS Credentials
        if: matrix.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: matrix.changed == 'true'
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker Image
        if: matrix.changed == 'true'
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          docker build \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/shopflow/${{ matrix.service }}:${SHORT_SHA} \
            ${{ matrix.context }}

      - name: Push Docker Image
        if: matrix.changed == 'true' && github.event_name == 'push'
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          IMAGE_URI=${ACCOUNT}.dkr.ecr.$AWS_REGION.amazonaws.com/shopflow/${{ matrix.service }}:${SHORT_SHA}
          docker push $IMAGE_URI
          docker tag $IMAGE_URI ${ACCOUNT}.dkr.ecr.$AWS_REGION.amazonaws.com/shopflow/${{ matrix.service }}:latest
          docker push ${ACCOUNT}.dkr.ecr.$AWS_REGION.amazonaws.com/shopflow/${{ matrix.service }}:latest

      - name: Update image tag in manifest
        if: matrix.changed == 'true' && github.event_name == 'push'
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          sed -i "s|image: .*shopflow/${{ matrix.service }}:.*|image: ${ACCOUNT}.dkr.ecr.$AWS_REGION.amazonaws.com/shopflow/${{ matrix.service }}:${SHORT_SHA}|g" \
            ${{ matrix.manifest }}

      - name: Commit updated manifest
        if: matrix.changed == 'true' && github.event_name == 'push'
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ${{ matrix.manifest }}
          git diff --staged --quiet || git commit -m "ci: update ${{ matrix.service }} image to ${SHORT_SHA}"
          git push

  # ── Deploy to EKS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name   ${{ env.EKS_CLUSTER }}

      - name: Deploy via Kustomize
        run: kubectl apply -k shopflow/gitops/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/auth            -n shopflow --timeout=120s
          kubectl rollout status deployment/user-service    -n shopflow --timeout=120s
          kubectl rollout status deployment/product-service -n shopflow --timeout=120s
          kubectl rollout status deployment/order-service   -n shopflow --timeout=120s
          kubectl rollout status deployment/gateway         -n shopflow --timeout=120s
          kubectl rollout status deployment/frontend        -n shopflow --timeout=120s

      - name: Show deployed services
        run: kubectl get svc -n shopflow
