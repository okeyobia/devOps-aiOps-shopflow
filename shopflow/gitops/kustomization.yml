apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shopflow

resources:
  - namespace.yaml
  - secrets.yaml
  - k8s/database/configmap.yaml
  - k8s/database/postgres.yaml
  - k8s/backend/auth.yaml
  - k8s/backend/user-service.yaml
  - k8s/backend/product-service.yaml
  - k8s/backend/order-service.yaml
  - k8s/backend/gateway.yaml
  - k8s/frontend/frontend.yaml
  - k8s/grafana-dashboard.yaml

generatorOptions:
  disableNameSuffixHash: true
