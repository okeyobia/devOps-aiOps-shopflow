apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: shopflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: 430367037730.dkr.ecr.us-east-2.amazonaws.com/shopflow/gateway:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: shopflow-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: shopflow
spec:
  selector:
    app: gateway
  ports:
    - port: 3001
      targetPort: 3001
